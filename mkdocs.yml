site_name: Apollo Docs
site_url: https://apollo.tealingg.dev/
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/lightbulb
        name: Switch to Dark Mode
      primary: cyan
      accent: light blue
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: Switch to Light Mode
      primary: black
      accent: light blue

plugins:
  - blog

repo_url: https://github.com/tealingg/apollo
repo_name: tealingg/apollo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

copyright: Made with ❤️ by tealingg
